<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Camponuevo</title>
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://esm.sh;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https: blob:;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        connect-src 'self' https://itlczokcdxgzgqrortpm.supabase.co https://*.supabase.co https://*.supabase.com https://cdnjs.cloudflare.com https://esm.sh https://api.resend.com;
        frame-ancestors 'none';
        form-action 'self';
        base-uri 'self';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- Head -->
    <link rel="icon" type="image/svg+xml" href="img/Asset 7.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d5a27',
                        secondary: '#4caf50',
                        accent: '#8bc34a',
                        light: '#f1f8e9',
                        dark: '#1b5e20'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-lock text-primary text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Restablecer Contraseña</h1>
            <p class="text-gray-500 mt-2">Ingresa tu nueva contraseña</p>
        </div>

        <div id="content">
            <form id="resetForm" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Nueva Contraseña</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required minlength="8"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition"
                            placeholder="Mínimo 8 caracteres">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p id="passwordHint" class="text-xs text-gray-500 mt-1">Debe tener al menos 8 caracteres, una mayúscula y un número</p>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirmar Contraseña</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition"
                            placeholder="Repite la contraseña">
                        <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-primary hover:bg-dark text-white font-bold py-3 px-4 rounded-lg transition flex items-center justify-center">
                    <span id="submitText">Cambiar Contraseña</span>
                    <span id="submitSpinner" class="hidden ml-2">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>
        </div>

        <div id="successMessage" class="hidden text-center py-8">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-green-600 text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">¡Contraseña Actualizada!</h2>
            <p class="text-gray-500 mb-6">Tu contraseña ha sido cambiada correctamente.</p>
            <a href="user.html" class="inline-block bg-primary hover:bg-dark text-white font-bold py-3 px-8 rounded-lg transition">
                Ir a Mi Cuenta
            </a>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
            <a href="user.html" class="text-primary hover:underline">
                <i class="fas fa-arrow-left mr-1"></i> Volver al inicio de sesión
            </a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const resetForm = document.getElementById('resetForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const content = document.getElementById('content');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');

            const togglePassword = document.getElementById('togglePassword');
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            toggleConfirmPassword.addEventListener('click', () => {
                const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
                confirmPasswordInput.type = type;
                toggleConfirmPassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            // Validate password strength
            function validatePassword(password) {
                const errors = [];
                if (password.length < 8) errors.push('al menos 8 caracteres');
                if (!/[A-Z]/.test(password)) errors.push('una mayúscula');
                if (!/[a-z]/.test(password)) errors.push('una minúscula');
                if (!/[0-9]/.test(password)) errors.push('un número');
                return errors;
            }

            passwordInput.addEventListener('input', () => {
                const errors = validatePassword(passwordInput.value);
                const hint = document.getElementById('passwordHint');
                if (errors.length > 0) {
                    hint.textContent = 'Falta: ' + errors.join(', ');
                    hint.classList.remove('text-green-600');
                    hint.classList.add('text-red-500');
                } else {
                    hint.textContent = '✓ Contraseña válida';
                    hint.classList.remove('text-red-500');
                    hint.classList.add('text-green-600');
                }
            });

            // Handle form submission
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.classList.add('hidden');

                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Validate password
                const errors = validatePassword(password);
                if (errors.length > 0) {
                    errorMessage.textContent = 'La contraseña debe tener ' + errors.join(', ');
                    errorMessage.classList.remove('hidden');
                    return;
                }

                // Check passwords match
                if (password !== confirmPassword) {
                    errorMessage.textContent = 'Las contraseñas no coinciden';
                    errorMessage.classList.remove('hidden');
                    return;
                }

                // Show loading
                submitBtn.disabled = true;
                submitText.textContent = 'Cambiando...';
                submitSpinner.classList.remove('hidden');

                try {
                    // Get the hash from URL
                    const hash = window.location.hash;
                    if (!hash || !hash.includes('access_token=')) {
                        throw new Error('Token de recuperación no válido o expirado');
                    }

                    // Supabase handles the token from URL automatically
                    const { error } = await window.supabase.auth.updateUser({
                        password: password
                    });

                    if (error) throw error;

                    // Show success
                    content.classList.add('hidden');
                    successMessage.classList.remove('hidden');

                } catch (err) {
                    errorMessage.textContent = err.message || 'Error al cambiar la contraseña. El enlace puede haber expirado.';
                    errorMessage.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitText.textContent = 'Cambiar Contraseña';
                    submitSpinner.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
